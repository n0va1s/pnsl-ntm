name: Deploy movimento.canonico.com.br

on:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    name: Lint e Qualidade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, sqlite3

      - name: Install Dependencies
        run: composer install --optimize-autoloader

      - name: Run Lint (Pint)
        run: vendor/bin/pint --test

  deploy:
    name: Deploy para Hostinger
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Instalar Dependências PHP (Produção)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Instalar Node.js e Build Assets (Vite)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build Assets
        run: |
          npm install
          npm run build

      - name: Sync FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          local-dir: ./
          # Atualizado para a nova pasta do subdomínio
          server-dir: public_html/movimento/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            storage/*.key
            .env
            tests/**
            phpunit.xml
            .github/**
            README.md
