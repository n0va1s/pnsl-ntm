name: Deploy movimento.canonico.com.br

on:
  push:
    branches: ["main"]

# Cancela runs anteriores ainda em andamento para o mesmo branch,
# evitando deploys sobrepostos.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Qualidade
  # ─────────────────────────────────────────────
  lint:
    name: Lint e Qualidade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, sqlite3
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Lint (Pint)
        run: vendor/bin/pint --test

  # ─────────────────────────────────────────────
  # 2. Testes
  # ─────────────────────────────────────────────
  test:
    name: Testes (Pest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, sqlite3
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copiar .env de teste
        run: cp .env.example .env

      - name: Gerar chave da aplicação
        run: php artisan key:generate

      - name: Executar testes
        run: php artisan test --parallel

  # ─────────────────────────────────────────────
  # 3. Build de Assets
  # ─────────────────────────────────────────────
  build:
    name: Build de Assets (Vite)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências Node
        run: npm ci

      - name: Build assets
        run: npm run build

      # Persiste o diretório public/build entre jobs
      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: public-build
          path: public/build
          retention-days: 1

  # ─────────────────────────────────────────────
  # 4. Deploy para Hostinger via FTPS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy para Hostinger
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências PHP (produção)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: public-build
          path: public/build

      # As caches do Laravel (config, route, view) são geradas no servidor
      # via SSH após o FTP, pois os paths precisam refletir o ambiente de produção.
      # Aqui apenas garantimos que não há caches antigas do CI sendo enviadas.
      - name: Limpar caches locais do CI
        run: |
          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/routes-v7.php
          rm -f bootstrap/cache/packages.php
          rm -f bootstrap/cache/services.php

      - name: Deploy via FTPS para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftps          # FTPS (TLS explícito) — nunca FTP puro
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/docs/**
            **/.kiro/**
            storage/app/public/**
            storage/framework/sessions/**
            storage/framework/cache/**
            storage/framework/views/**
            storage/logs/**
            storage/debugbar/**
            bootstrap/cache/**
            .env*
            .editorconfig
            .gitattributes
            .gitignore
            .phpunit.result.cache
            analyze-coverage
            coverage
            phpunit.xml
            README.md
            package.json
            package-lock.json
            vite.config.*
            composer.*
            Makefile

      # Executa comandos pós-deploy no servidor via SSH.
      # Requer que o secret SSH_PRIVATE_KEY e SSH_HOST estejam configurados.
      - name: Pós-deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.APP_PATH }}

            # Modo de manutenção (evita erros para usuários durante o deploy)
            php artisan down --retry=15 --refresh=30 || true

            # Rodar migrations com segurança
            php artisan migrate --force

            # Gerar caches com os paths corretos do servidor
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Reiniciar filas se houver worker rodando
            php artisan queue:restart || true

            # Sair do modo de manutenção
            php artisan up
